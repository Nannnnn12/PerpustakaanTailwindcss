<body class="bg-gray-200">

    <sidebar id="navMenu"

        <h1 class="ml-4 mt-4 text-3xl font-bold">Welcome, Admin</h1>
        <nav class="mt-10">
            <ul class="space-y-3">

                        </svg>
                        Dashboard
                    </li>
                </a>

                <li>
                    <button onclick="toggleDropdown()"
                        class="w-full flex items-center justify-between transition duration-200 hover:bg-slate-200 rounded-md h-12 pl-4 pr-4 my-1">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="size-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125M12 10.875v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 10.875c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125M13.125 12h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125M20.625 12c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h7.5M12 14.625v-1.5m0 1.5c0 .621-.504 1.125-1.125 1.125M12 14.625c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m0 1.5v-1.5m0 0c0-.621.504-1.125 1.125-1.125m0 0h7.5" />
                            </svg>
                            Tables
                        </div>
                        <svg id="dropdownIcon" class="w-4 h-4 transition-transform duration-200" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <ul id="tablesDropdown"
                        class="ml-4 mt-1 space-y-1 max-h-0 overflow-hidden transition-all duration-300 ease-in-out">

                        <li>
                            <a href="tabelbuku.html"
                                class="block px-4 py-2 rounded-md hover:bg-slate-200 transition duration-200 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                                </svg>
                                DaftarBuku</a>
                        </li>
                        <li>
                            <a href="dashboard.html"
                                class="block px-4 py-2 rounded-md hover:bg-slate-200 transition duration-200 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                                </svg>

                                Data Anggota</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </sidebar>

    <header class="bg-white shadow-lg p-4 h-24 ml-0 flex justify-between items-center z-50">
        <div class="xl:ml-80 ml-5">
            <input
                class="border-2 border-black focus:border-none outline-none focus:ring-4 focus:ring-orange-400 rounded-md p-4 transition duration-200 xl:w-[600px] md:w-96 sm:w-72 h-16 bg-transparent hover:bg-slate-100"
                type="text" name="judul" placeholder="Cari">
        </div>
        <div class="flex gap-3 items-center">
            <a href="#" class="cursor-pointer" onclick="userMenu()"><img src="\images\userr.jpg"
                    class="size-12 border-4 border-black rounded-full"></a>

            <div id="userMenu"
                class="bg-white shadow-lg w-40 h-36 absolute top-24 right-0 rounded-md transform translate-x-full transition-transform duration-300 ease-in-out z-50">
                <ul class="space-y-3 p-4">
                    <li class="p-2 hover:bg-slate-100 rounded-md flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        Account
                    </li>

                    <li class="p-2 hover:bg-slate-100 rounded-md flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
                        </svg>
                        Log Out
                    </li>
                </ul>
            </div>

            <button onclick="toggleMenu()" class="xl:hidden text-3xl dark:text-black">
                ☰
            </button>
        </div>
    </header>

    <section class="p-10 xl:ml-72 ml-0">
        <div class="flex justify-start items-center mb-6">
            <h1 class="text-4xl">Dashboard</h1>
        </div>
        <div class="grid sm:grid-cols-1 md:grid-cols-3 xl:grid-cols-3 gap-4 mb-4">
            <!-- Kartu 1: Jumlah Buku -->
            <div class="bg-white rounded-2xl shadow-md p-6 flex items-center gap-4 hover:shadow-lg transition">
                <div class="bg-orange-100 p-3 rounded-full">
                    <!-- Icon buku -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-orange-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 6v12m0-12H6a2 2 0 00-2 2v10a2 2 0 002 2h6m0-12h6a2 2 0 012 2v10a2 2 0 01-2 2h-6" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-3xl text-slate-700">10,000</h1>
                    <p class="text-orange-500 font-medium text-lg">Jumlah Buku</p>
                </div>
            </div>

            <!-- Kartu 2: Jumlah Peminjam -->
            <div class="bg-white rounded-2xl shadow-md p-6 flex items-center gap-4 hover:shadow-lg transition">
                <div class="bg-blue-100 p-3 rounded-full">
                    <!-- Icon peminjam (orang + panah) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M15 12h7m0 0l-3-3m3 3l-3 3M10 4a4 4 0 110 8 4 4 0 010-8zm0 8c-3 0-6 2-6 5v3h12v-3c0-3-3-5-6-5z" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-3xl text-slate-700">10,000</h1>
                    <p class="text-blue-500 font-medium text-lg">Jumlah Peminjam</p>
                </div>
            </div>

            <!-- Kartu 3: Jumlah Member -->
            <div class="bg-white rounded-2xl shadow-md p-6 flex items-center gap-4 hover:shadow-lg transition">
                <div class="bg-green-100 p-3 rounded-full">
                    <!-- Icon user/member -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M5.121 17.804A7.975 7.975 0 0112 15c2.21 0 4.21.896 5.657 2.343M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-3xl text-slate-700">10,000</h1>
                    <p class="text-green-500 font-medium text-lg">Jumlah Member</p>
                </div>
            </div>
        </div>

        <div class="grid sm:grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-5 ">
            <div class="bg-white rounded-lg shadow-lg h-[650px] p-8">
                <h2>Statistik Buku Perpustakaan</h2>
                <canvas id="bukuChart" class="w-full h-full"></canvas>
            </div>
            <div class="bg-white rounded-lg shadow-lg px-4 py-6 flex flex-col items-center">
                <h2 class="text-2xl font-bold mb-4 text-center">Statistik Member Perpustakaan</h2>

                <div class="w-full max-w-md aspect-square">
                    <canvas id="anggotaChart" class="w-full h-full"></canvas>
                </div>
            </div>
        </div>

        </div>
    </section>

    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById('tablesDropdown');
            const icon = document.getElementById('dropdownIcon');

            dropdown.classList.toggle('max-h-0');
            dropdown.classList.toggle('max-h-40');
            icon.classList.toggle('rotate-180');
        }
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('-translate-x-full');
        }

        function userMenu() {
            const user = document.getElementById('userMenu');
            user.classList.toggle('translate-x-full');
            user.classList.toggle('translate-x-0');
        }

        const ctx2 = document.getElementById('bukuChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Fiksi', 'Non-Fiksi', 'Sejarah', 'Komik', 'Biografi', 'Sains'],
                datasets: [{
                    label: 'Jumlah Buku',
                    data: [120, 80, 40, 60, 30, 90],
                    backgroundColor: 'orange'
                }]
            },
            options: {
                maintainAspectRatio: false, // agar tidak dipaksa proporsional
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Jumlah Buku per Kategori'
                    },
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const ctx = document.getElementById('anggotaChart').getContext('2d');
        const memberChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Aktif', 'Tidak Aktif', 'Kadaluarsa'],
                datasets: [{
                    label: 'Jumlah Member',
                    data: [120, 30, 10],
                    backgroundColor: [
                        'rgba(34, 197, 94, 0.7)',     // Hijau - Aktif
                        'rgba(251, 191, 36, 0.7)',    // Kuning - Tidak Aktif
                        'rgba(239, 68, 68, 0.7)'      // Merah - Kadaluarsa
                    ],
                    borderColor: [
                        'rgba(34, 197, 94, 1)',
                        'rgba(251, 191, 36, 1)',
                        'rgba(239, 68, 68, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    title: {
                        display: true,
                        text: 'Distribusi Member Perpustakaan'
                    }
                }
            }
        });
    </script>
</body>

</html>
