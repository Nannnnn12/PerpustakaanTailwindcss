    <header class="bg-white shadow-lg p-4 h-24 ml-0 flex justify-between items-center z-50">
        <div class="xl:ml-80 ml-5">
            <input
                class="border-2 border-black focus:border-none outline-none focus:ring-4 focus:ring-orange-400 rounded-md p-4 transition duration-200 xl:w-[600px] md:w-96 sm:w-72 h-16 bg-transparent hover:bg-slate-100"
                type="text" name="judul" placeholder="Cari">
        </div>
        <div class="flex gap-3 items-center">
            <a href="#" class="cursor-pointer" onclick="userMenu()"><img src="\images\userr.jpg"
                    class="size-12 border-4 border-black rounded-full"></a>
            <div id="userMenu"
                class="bg-white shadow-lg w-40 h-36 absolute top-24 right-0 rounded-md transform translate-x-full transition-transform duration-300 ease-in-out z-50">
                <ul class="space-y-3 p-4">
                    <li class="p-2 hover:bg-slate-100 rounded-md flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">

                            stroke="currentColor" class="size-6">

    <section class="p-10 xl:ml-72 ml-0">
        <div class="flex justify-start items-center mb-6">
            <h1 class="text-4xl">Tables> </h1>
            <h1 class="text-4xl font-extralight text-slate-500">Daftar Buku</h1>
        </div>
        <div class="bg-white rounded-lg shadow-lg h-auto p-7 space-y-8">
            <div class="flex flex-col justify-center items-center space-y-5">
                <h1 class="text-4xl font-bold">Daftar Buku</h1>
                <div class="w-full">
                    <table class="w-full border-b rounded-lg">
                        <tr class="bg-orange-400 text-left pl-2 h-12">
                            <th class="pl-2">No</th>
                            <th class="pl-2">Judul</th>
                            <th class="pl-2">Genre</th>
                            <th class="pl-2">Penulis</th>
                            <th class="pl-2 flex justify-center mt-3">Opsi</th>
                        </tr>
                        <tr class="bg-orange-200 h-16">
                            <td class="pl-2">1</td>
                            <td class="pl-2">buku</td>
                            <td class="pl-2">sains</td>
                            <td class="pl-2">Jono</td>
                            <td class="flex items-center justify-center gap-6 mt-3">
                                <button class="bg-orange-300 w-16 rounded-md">Edit</button>
                                <button class="bg-red-500 w-16 rounded-md">hapus</button>
                            </td>
                        </tr>
                        <tr class="bg-orange-200 h-16">
                            <td class="pl-2">2</td>
                            <td class="pl-2">buku</td>
                            <td class="pl-2">sejarah</td>
                            <td class="pl-2">Joni</td>
                            <td class="flex items-center justify-center gap-6 mt-3">
                                <button class="bg-orange-300 w-16 rounded-md">Edit</button>
                                <button class="bg-red-500 w-16 rounded-md">hapus</button>
                            </td>
                        </tr>
                        <tr class="bg-orange-200 h-16">
                            <td class="pl-2">3</td>
                            <td class="pl-2">buku</td>
                            <td class="pl-2">NonFiksi</td>
                            <td class="pl-2">Anwar</td>
                            <td class="flex justify-center gap-6 mt-3">
                                <button class="bg-orange-300 w-16 rounded-md">Edit</button>
                                <button class="bg-red-500 w-16 rounded-md">hapus</button>
                            </td>
                        </tr>
                        <tr class="bg-orange-200 h-16">
                            <td class="pl-2">4</td>
                            <td class="pl-2">buku</td>
                            <td class="pl-2">fiksi</td>
                            <td class="pl-2">Joko</td>
                            <td class="flex items-center justify-center gap-6 mt-3">
                                <button class="bg-orange-300 w-16 rounded-md">Edit</button>
                                <button class="bg-red-500 w-16 rounded-md">hapus</button>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            <a href="tambahbuku.html"><button class="bg-orange-400 rounded-md w-32 h-14 mt-5">Tambah Buku</button></a>
        </div>
    </section>
    <script>
        if (window.location.pathname.includes('tabelbuku.html')) {
            const dropdown = document.getElementById('tablesDropdown');
            const icon = document.getElementById('dropdownIcon');

            dropdown.classList.remove('max-h-0');
            dropdown.classList.add('max-h-40');
            icon.classList.add('rotate-180');
        }

        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.classList.toggle('-translate-x-full');
        }

        function userMenu() {
            const user = document.getElementById('userMenu');
            user.classList.toggle('translate-x-full');
            user.classList.toggle('translate-x-0');
        }
    </script>
</body>

</html>
